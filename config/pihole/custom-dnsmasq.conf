# =============================================================================
# Pi-hole - Configuración personalizada de dnsmasq
# =============================================================================
# Ajustes adicionales para el servidor DNS.
# Este archivo se monta en /etc/dnsmasq.d/ dentro del contenedor Pi-hole.
# =============================================================================

# No usar /etc/resolv.conf del host
no-resolv

# Servidores DNS upstream (Cloudflare)
server=1.1.1.1
server=1.0.0.1

# Servidores DNS de respaldo (Google)
server=8.8.8.8
server=8.8.4.4

# Tamaño de la caché DNS
cache-size=10000

# No reenviar nombres sin dominio (consultas locales)
domain-needed

# No reenviar direcciones de rango privado
bogus-priv

# Escuchar en todas las interfaces (necesario para clientes VPN)
listen-address=0.0.0.0
