# =============================================================================
# Fail2Ban - Jail para Traefik
# =============================================================================
# Protege los paneles web detrás de Traefik contra ataques de fuerza bruta.
# Monitorea los logs de acceso de Traefik para detectar intentos fallidos.
# =============================================================================

[traefik-auth]
enabled = true
port = http,https
filter = traefik-auth
logpath = /var/log/traefik/access.log
maxretry = 5
findtime = 300
bantime = 3600

[traefik-botsearch]
enabled = true
port = http,https
filter = traefik-botsearch
logpath = /var/log/traefik/access.log
maxretry = 10
findtime = 300
bantime = 600
