# =============================================================================
# VPN Platform - Docker Compose (Dokploy Compatible)
# =============================================================================

services:

  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    ports:
      - "51820:51820/udp"
    environment:
      - WG_HOST=${WG_HOST}
      - PASSWORD=${WG_ADMIN_PASSWORD}
      - WG_DEFAULT_DNS=10.8.1.100
      - WG_ALLOWED_IPS=0.0.0.0/0, ::/0
      - WG_DEFAULT_ADDRESS=10.8.0.x
      - WG_PORT=51820
      - PORT=51821
    volumes:
      - wg-easy-data:/etc/wireguard
    networks:
      vpn-internal:
        ipv4_address: 10.8.1.2
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wg-easy.rule=Host(`vpn.${SERVER_DOMAIN}`)"
      - "traefik.http.routers.wg-easy.entrypoints=websecure"
      - "traefik.http.routers.wg-easy.tls.certresolver=letsencrypt"
      - "traefik.http.services.wg-easy.loadbalancer.server.port=51821"

  pihole:
    image: pihole/pihole:latest
    restart: unless-stopped
    environment:
      - WEBPASSWORD=${PIHOLE_PASSWORD}
      - TZ=${TIMEZONE:-America/Sao_Paulo}
      - PIHOLE_DNS_=1.1.1.1;1.0.0.1
      - DNSMASQ_LISTENING=all
    volumes:
      - pihole-data:/etc/pihole
      - pihole-dnsmasq:/etc/dnsmasq.d
    networks:
      vpn-internal:
        ipv4_address: 10.8.1.100
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pihole.rule=Host(`dns.${SERVER_DOMAIN}`)"
      - "traefik.http.routers.pihole.entrypoints=websecure"
      - "traefik.http.routers.pihole.tls.certresolver=letsencrypt"
      - "traefik.http.services.pihole.loadbalancer.server.port=80"

  uptime-kuma:
    image: louislam/uptime-kuma:latest
    restart: unless-stopped
    volumes:
      - uptime-kuma-data:/app/data
    networks:
      - vpn-internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.uptime-kuma.rule=Host(`status.${SERVER_DOMAIN}`)"
      - "traefik.http.routers.uptime-kuma.entrypoints=websecure"
      - "traefik.http.routers.uptime-kuma.tls.certresolver=letsencrypt"
      - "traefik.http.services.uptime-kuma.loadbalancer.server.port=3001"

networks:
  vpn-internal:
    driver: bridge
    ipam:
      config:
        - subnet: 10.8.1.0/24

volumes:
  wg-easy-data:
  pihole-data:
  pihole-dnsmasq:
  uptime-kuma-data:
